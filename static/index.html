<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Access Control Tech Tool</h1>

    <div id="mode-tabs">
        <button class="tab active" onclick="switchTab('receive')">Receive</button>
        <button class="tab" onclick="switchTab('transmit')">Transmit</button>
    </div>

    <div id="receive-panel">
        <button id="scan-btn">Fake Scan</button>
        <div id="status">Connecting...</div>
        <div id="scan-log"></div>
    </div>

    <div id="transmit-panel" style="display:none;">
        <div class="tx-form">
            <label>Facility Code</label>
            <input type="number" id="tx-fc" min="0" max="255" value="1">
            <label>Card Number</label>
            <input type="number" id="tx-card" min="0" max="65535" value="1">
            <label>Format</label>
            <select id="tx-format">
                <option value="H10301">H10301 (26-bit)</option>
            </select>
            <button id="tx-btn">Transmit</button>
            <div id="tx-status"></div>
        </div>
    </div>

    <script>
        const btn = document.getElementById("scan-btn");
        const log = document.getElementById("scan-log");
        const status = document.getElementById("status");
        const source = new EventSource("/scans");

        source.onopen = () => { status.textContent = "Connected — waiting for scans"; };
        source.onerror = () => { status.textContent = "Disconnected — retrying..."; };
        source.onmessage = (event) => {
            const scan = JSON.parse(event.data);
            const parity = scan.parity_ok ? "PASS" : "FAIL";
            const parityClass = scan.parity_ok ? "parity-pass" : "parity-fail";
            const card = document.createElement("div");
            card.className = "scan-card";
            card.innerHTML =
                `<div class="scan-top">` +
                    `<span class="label">Format:</span> ${scan.format} &nbsp; ` +
                    `<span class="label">FC:</span> ${scan.facility_code ?? "—"} &nbsp; ` +
                    `<span class="label">Card:</span> ${scan.card_number ?? "—"} &nbsp; ` +
                    `<span class="label">Parity:</span> <span class="${parityClass}">${parity}</span>` +
                `</div>` +
                `<div class="scan-bits">${scan.raw_bits}</div>` +
                `<div class="scan-time">${scan.timestamp}</div>`;
            log.prepend(card);
        };

        btn.addEventListener("click", () => {
            fetch("/fake-scan", { method: "POST" });
        });

        document.getElementById("tx-btn").addEventListener("click", async () => {
            const fc = document.getElementById("tx-fc").value;
            const card = document.getElementById("tx-card").value;
            const fmt = document.getElementById("tx-format").value;
            const txStatus = document.getElementById("tx-status");

            txStatus.textContent = "Transmitting...";
            const res = await fetch(`/transmit?facility_code=${fc}&card_number=${card}&format_type=${fmt}`, {
                method: "POST"
            });
            const data = await res.json();
            if (data.error) {
                txStatus.textContent = "Error: " + data.error;
            } else {
                txStatus.textContent = `Sent FC:${data.facility_code} Card:${data.card_number} (${data.bits})`;
            }
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'receive') {
                document.getElementById('receive-panel').style.display = 'block';
                document.getElementById('transmit-panel').style.display = 'none';
                document.querySelectorAll('.tab')[0].classList.add('active');
            } else {
                document.getElementById('receive-panel').style.display = 'none';
                document.getElementById('transmit-panel').style.display = 'block';
                document.querySelectorAll('.tab')[1].classList.add('active');
            }
        }
    </script>
</body>
</html>
